services:
  minecraft:
    image: itzg/minecraft-server
    container_name: minecraft-server
    ports:
      - "25565:25565" # Minecraft default port
      - "25575:25575" # RCON port passthrough
    environment:
      EULA: "TRUE"           # You must accept the EULA
      TYPE: "VANILLA"        # VANILLA, PAPER, FORGE, etc.
      VERSION: "LATEST"      # Or a specific version like "1.21.1"
      MEMORY: "2G"           # Adjust based on your host RAM
      MAX_PLAYERS: 10
      DIFFICULTY: "normal"   # peaceful, easy, normal, hard
      MODE: "survival"       # survival, creative, adventure, spectator
      VIEW_DISTANCE: 8
      SPAWN_PROTECTION: 0
    volumes:
      - ${PWD}/data:/data      # Persist world and config
    restart: unless-stopped

